name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # opencode itself runs on the latest Bun; we test against the
        # current stable. If a future opencode pins an older Bun we can
        # add that here.
        bun: [latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run validate

  release-guard:
    name: Release hygiene (version bump + no [Unreleased])
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Every PR must bump package.json's version and file a dated CHANGELOG
      # entry — no `[Unreleased]`. On a PR we hand the guard the base-main
      # version so it can prove the bump happened.
      - name: Check release hygiene
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --depth=1 origin main
            RELEASE_BASE_VERSION="$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
            export RELEASE_BASE_VERSION
            echo "Base (origin/main) version: $RELEASE_BASE_VERSION"
          fi
          node scripts/check-release.mjs
